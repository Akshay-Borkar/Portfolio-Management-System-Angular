<div class="chart-wrapper">
  <div class="chart-toolbar">
    @for (iv of intervals; track iv.label) {
      <button
        class="interval-btn"
        [class.active]="selectedInterval.label === iv.label"
        (click)="selectInterval(iv)"
      >{{ iv.label }}</button>
    }
  </div>
  @if (loading) {
    <div class="chart-loading">
      <p-skeleton height="200px" />
    </div>
  }
  <div #chartContainer class="chart-container" [class.hidden]="loading"></div>
</div>
