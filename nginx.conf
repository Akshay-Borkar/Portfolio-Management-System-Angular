server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Angular client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API to backend container
    location /api/ {
        proxy_pass http://backend:5059/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy SignalR hub (WebSocket upgrade required)
    location /stockMarketHub {
        proxy_pass http://backend:5059/stockMarketHub;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache hashed JS/CSS bundles aggressively; never cache index.html
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
